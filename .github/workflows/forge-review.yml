name: Forge Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  review:
    name: Principle-Based Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD~1 for diff

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Forge
        run: go build -o ./forge ./cmd/forge/

      - name: Run Forge Review
        id: review
        run: |
          SARIF_FILE="forge-review-results.sarif"

          set +e
          ./forge review \
            --diff HEAD~1..HEAD \
            --format sarif \
            --severity-threshold warning \
            > "$SARIF_FILE" 2>&1
          EXIT_CODE=$?
          set -e

          # Extract findings summary.
          FINDINGS_COUNT=$(jq '[.runs[].results[]] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
          HAS_CRITICAL=$(jq '[.runs[].results[] | select(.level == "error")] | length > 0' "$SARIF_FILE" 2>/dev/null || echo "false")

          echo "findings-count=$FINDINGS_COUNT" >> "$GITHUB_OUTPUT"
          echo "has-critical=$HAS_CRITICAL" >> "$GITHUB_OUTPUT"
          echo "Forge review found $FINDINGS_COUNT findings (critical=$HAS_CRITICAL)"

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: forge-review-results.sarif
          category: forge-review

      - name: Comment findings summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const findingsCount = '${{ steps.review.outputs.findings-count }}';
            const hasCritical = '${{ steps.review.outputs.has-critical }}';

            if (findingsCount === '0') {
              return;  // No findings, skip comment.
            }

            const status = hasCritical === 'true' ? 'Critical' : 'Review';
            const body = [
              `## ${status} - Forge Code Review`,
              '',
              `**Findings:** ${findingsCount}`,
              `**Critical:** ${hasCritical}`,
              '',
              'See the Code Scanning alerts tab for details.',
              '',
              '_Generated by [Forge](https://github.com/jelmersnoeck/forge) principle-based review._'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Fail on critical findings
        if: steps.review.outputs.has-critical == 'true'
        run: |
          echo "::error::Forge review found critical principle violations"
          exit 1
