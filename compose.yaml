services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    env_file: .env
    environment:
      - GATEWAY_HOST=0.0.0.0
      - WORKSPACE_DIR=/data/workspace
      - SESSIONS_DIR=/data/sessions
    volumes:
      - forge-data:/data
    restart: unless-stopped

volumes:
  forge-data:
